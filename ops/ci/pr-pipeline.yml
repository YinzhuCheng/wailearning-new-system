version: '1.0'
name: pr-pipeline
displayName: PRPipeline
stages:
  - stage:
    name: test
    displayName: Test
    steps:
      - step: build@python
        name: test_python
        displayName: Python tests
        pythonVersion: '3.11'
        commands:
          - python -m pip install --upgrade pip
          - pip3 config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - python -m pip install -r requirements.txt
          - python -m pytest -q
triggers:
  pr:
    branches:
      include:
        - master
