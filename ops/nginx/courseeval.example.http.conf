# When clients use a bare public IP in the URL, the Host header is the IP, not a domain
# name.  This `default_server` block ensures those requests are served the same app as
# `server_name` below (otherwise Nginx's default site may show or return 404).
# Before certbot, deploy_frontend.sh installs this HTTP template only.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/courseeval.example/admin;
    index index.html;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /parent {
        return 301 /parent/;
    }

    location ^~ /parent/ {
        root /var/www/courseeval.example;
        try_files $uri $uri/ /parent/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

